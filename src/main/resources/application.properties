spring.application.name=trinetra-backend

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
app.jwt.expiration-ms=${JWT_EXPIRATION:${JWT_EXPIRATION_MS:86400000}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap-admin.name=${APP_BOOTSTRAP_ADMIN_NAME:TRINETRA Admin}