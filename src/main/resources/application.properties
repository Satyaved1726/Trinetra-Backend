spring.application.name=trinetra-backend

server.port=${SERVER_PORT:${PORT:8081}}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:trinetra;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.id.new_generator_mappings=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

jwt.secret=${JWT_SECRET:dHJpbmV0cmEtZGVmYXVsdC1zZWNyZXQtdHJpbmV0cmEtMjAyNg==}
app.jwt.expiration-ms=${JWT_EXPIRATION:${JWT_EXPIRATION_MS:86400000}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174,https://*.vercel.app}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
storage.url=${STORAGE_URL:}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:${APP_BOOTSTRAP_ADMIN_EMAIL:}}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=false