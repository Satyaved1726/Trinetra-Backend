spring.application.name=trinetra-backend

server.port=${SERVER_PORT:${PORT:8080}}
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.id.new_generator_mappings=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:${JWT_EXPIRATION_MS:86400000}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:${APP_BOOTSTRAP_ADMIN_EMAIL:}}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}