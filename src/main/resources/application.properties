spring.application.name=trinetra-backend

server.port=${SERVER_PORT:${PORT:8081}}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
# Disable server-side prepared statements — required for Supabase PgBouncer (transaction pooling mode)
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.id.new_generator_mappings=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

jwt.secret=${JWT_SECRET:dHJpbmV0cmEtZGVmYXVsdC1zZWNyZXQtdHJpbmV0cmEtMjAyNg==}
app.jwt.expiration-ms=${JWT_EXPIRATION:${JWT_EXPIRATION_MS:86400000}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174,https://trinetra-weld.vercel.app,https://*.vercel.app}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
storage.url=${STORAGE_URL:}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:${APP_BOOTSTRAP_ADMIN_EMAIL:}}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=false